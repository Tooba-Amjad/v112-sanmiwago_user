  video_player: ^2.10.0
  frontend_server_client: ^4.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_community_generator: 3.3.0-dev.3
#  isar_generator: ^3.1.0+1
#  isar_community_generator: ^3.3.0-dev.1
